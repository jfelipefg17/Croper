version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: products_mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: products_db

  api:
    build: .
    container_name: products_api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      MONGODB_URI: mongodb://mongodb:27017/products_db
      JWT_SECRET: cambia_esto_en_produccion
      PORT: 3000
    depends_on:
      - mongodb

volumes:
  mongo_data:
